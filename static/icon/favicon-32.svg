<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="6" fill="#0A3D2E"/>
  <!-- Dome -->
  <path d="M16 7 C12 7 9 10 9 13 L9 14 L23 14 L23 13 C23 10 20 7 16 7 Z"
        fill="none" stroke="#C8A84B" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Finial + crescent -->
  <line x1="16" y1="7" x2="16" y2="5" stroke="#C8A84B" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M14.5 4 A2 2 0 1 1 17.5 3 A1.3 1.3 0 1 0 14.5 4 Z" fill="#C8A84B"/>
  <!-- Body -->
  <rect x="8" y="14" width="16" height="11" fill="none" stroke="#C8A84B" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Arch door -->
  <path d="M13.5 25 L13.5 20 Q16 17.5 18.5 20 L18.5 25" fill="none" stroke="#C8A84B" stroke-width="1" stroke-linecap="round"/>
  <!-- Minarets -->
  <rect x="5" y="15" width="3" height="10" fill="none" stroke="#C8A84B" stroke-width="1"/>
  <path d="M5 15 Q6.5 13 8 15" fill="none" stroke="#C8A84B" stroke-width="1" stroke-linecap="round"/>
  <rect x="24" y="15" width="3" height="10" fill="none" stroke="#C8A84B" stroke-width="1"/>
  <path d="M24 15 Q25.5 13 27 15" fill="none" stroke="#C8A84B" stroke-width="1" stroke-linecap="round"/>
  <!-- Ground -->
  <line x1="4" y1="25" x2="28" y2="25" stroke="#C8A84B" stroke-width="1.2" stroke-linecap="round"/>
  <!-- 5 dots -->
  <circle cx="12" cy="28" r="1" fill="#C8A84B"/>
  <circle cx="15" cy="28" r="1" fill="#C8A84B"/>
  <circle cx="18" cy="28" r="1" fill="#C8A84B"/>
  <circle cx="21" cy="28" r="1" fill="#C8A84B"/>
  <!-- (only 4 fit at 32px, intentional) -->
</svg>
