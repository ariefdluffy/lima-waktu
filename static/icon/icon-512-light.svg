  <line x1="100" y1="370" x2="412" y2="370" stroke="#0A3D2E" stroke-width="10" stroke-linecap="round"/>
  <!-- 5 dots gold -->
  <circle cx="176" cy="402" r="8" fill="#C8A84B"/>
  <circle cx="216" cy="402" r="8" fill="#C8A84B"/>
  <circle cx="256" cy="402" r="8" fill="#C8A84B"/>
