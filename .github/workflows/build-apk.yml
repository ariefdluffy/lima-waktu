name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Memungkinkan Anda memicu proses build secara manual dari web GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: |
          cd android-app
          # Kita buat file gradlew sederhana jika tidak ada di repositori
          if [ ! -f gradlew ]; then
            echo "Gradle wrapper not found, generating one..."
            gradle wrapper
          fi
          chmod +x gradlew

      - name: Build APK with Gradle
        run: |
          cd android-app
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lima-waktu-tv-debug-apk
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
